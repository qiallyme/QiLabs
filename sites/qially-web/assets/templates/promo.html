<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Offer | Qially Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

<main class="page page--promo min-h-screen flex flex-col justify-center">
  <div class="container mx-auto px-6 py-20 text-center">
    
    <div class="inline-block px-4 py-1.5 bg-blue-600 text-white rounded-full text-xs font-bold uppercase tracking-widest mb-8">
      Limited Time Offer
    </div>

    <h1 class="text-5xl md:text-7xl font-black mb-8 leading-tight max-w-4xl mx-auto">
      Fix your Ops. <br/>
      <span class="text-blue-500">Scale your profit.</span>
    </h1>

    <p class="text-xl md:text-2xl text-slate-400 mb-12 max-w-2xl mx-auto leading-relaxed">
      Get the Q4 Growth Pack: bookkeeping, strategy, and tax prep in one flat-fee package. No hidden costs.
    </p>

    <div class="flex flex-col md:flex-row gap-6 justify-center items-center mb-16">
      <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 w-full max-w-xs text-left">
        <h3 class="text-sm font-semibold text-blue-400 mb-1 uppercase tracking-wider">Before</h3>
        <p class="text-slate-500 line-through text-lg">$2,500 /mo</p>
      </div>
      <div class="bg-blue-600 p-6 rounded-2xl shadow-2xl shadow-blue-500/20 w-full max-w-xs text-left scale-110 border border-blue-400">
        <h3 class="text-sm font-semibold text-blue-100 mb-1 uppercase tracking-wider">Now</h3>
        <p class="text-white text-3xl font-bold">$1,200 /mo</p>
      </div>
    </div>

    <a href="/buy/" class="inline-block px-12 py-5 bg-white text-slate-900 text-xl font-black rounded-2xl hover:bg-blue-50 transition transform hover:scale-105 active:scale-95 shadow-xl">
      Claim This Offer
    </a>

    <p class="mt-8 text-slate-500 text-sm italic">Offer expires in 14 days. Limited to first 10 clients.</p>
  </div>
</main>

</body>
</html>
