<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QiAlly - Documents Received</title>
    <style>
      /* Base styles */
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      table {
        border-collapse: collapse;
      }
      a {
        color: #1ab16d;
        text-decoration: none;
        font-weight: bold;
      }
      .button {
        display: inline-block;
        padding: 12px 24px;
        background-color: #1ab16d;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f8fafc">
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f8fafc; padding: 20px"
    >
      <tr>
        <td align="center">
          <!-- Wrapper -->
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 12px;
              border: 1px solid #e2e8f0;
              overflow: hidden;
              box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            "
          >
            <!-- Header -->
            <tr>
              <td
                align="center"
                style="background-color: #0f172a; padding: 30px"
              >
                <div
                  style="
                    font-family: &quot;Times New Roman&quot;, serif;
                    color: #ffffff;
                    font-size: 28px;
                    font-weight: bold;
                  "
                >
                  QiAlly
                </div>
              </td>
            </tr>
            <!-- Body -->
            <tr>
              <td
                style="
                  padding: 40px;
                  color: #334155;
                  font-size: 16px;
                  line-height: 1.6;
                "
              >
                <p style="margin-top: 0">Hi {FirstName},</p>

                <p style="font-size: 18px; color: #15803d; font-weight: bold">
                  We got your organizer + documents ✅ / Recibimos tus
                  documentos ✅
                </p>

                <p><strong>Next steps:</strong></p>
                <p>
                  We will review everything shortly and follow up with any
                  questions or confirmation for your review call.
                </p>

                <p style="margin-bottom: 0">— QiAlly</p>
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td
                align="center"
                style="
                  background-color: #f8fafc;
                  padding: 20px;
                  font-size: 12px;
                  color: #94a3b8;
                  border-top: 1px solid #e2e8f0;
                "
              >
                &copy; 2025 QiAlly. All rights reserved.<br />
                <br />
                <a href="#" style="color: #94a3b8; text-decoration: underline"
                  >Unsubscribe</a
                >
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
