<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tax Prepay Intake</title>
<style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f5; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 20px auto; background-color: #ffffff; padding: 20px; border-radius: 8px; border: 1px solid #e4e4e7; }
    .header { border-bottom: 2px solid #0f172a; padding-bottom: 10px; margin-bottom: 20px; }
    .header h2 { color: #0f172a; margin: 0; font-size: 20px; }
    .data-row { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
    .data-row:last-child { border-bottom: none; }
    .label { font-weight: 700; color: #64748b; font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 4px; }
    .value { color: #0f172a; font-size: 16px; font-weight: 500; }
    .footer { font-size: 11px; color: #94a3b8; margin-top: 20px; border-top: 1px solid #e4e4e7; padding-top: 10px; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>New $99 Tax Prepay Intake 🚀</h2>
    </div>

    <div class="data-row">
        <span class="label">Client Name</span>
        <span class="value">{{name}}</span>
    </div>

    <div class="data-row">
        <span class="label">Email</span>
        <span class="value"><a href="mailto:{{email}}" style="color: #38bdf8; text-decoration: none;">{{email}}</a></span>
    </div>

    <div class="data-row">
        <span class="label">Phone</span>
        <span class="value">{{phone}}</span>
    </div>

    <div class="data-row">
        <span class="label">Expected Tier</span>
        <span class="value" style="background: #eff6ff; color: #1d4ed8; padding: 2px 6px; border-radius: 4px;">{{tier_selection}}</span>
    </div>

    <div class="data-row">
        <span class="label">Notes</span>
        <span class="value">{{notes}}</span>
    </div>

    <div class="footer">
        Timestamp: {{timestamp}}<br>
        Source: tax99.qially.com/next-steps-intake
    </div>
</div>

</body>
</html>
