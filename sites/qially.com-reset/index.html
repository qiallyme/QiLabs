<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forged in the Fire | Coming Soon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --fire-core: #ffea00;
            --fire-mid: #ff6a00;
            --fire-dark: #cc1100;
            --bg-color: #030303;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        /* Canvas for the smoke particles */
        #smokeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 3rem;
        }

        /* The Chrysalis Shape */
        .chrysalis-wrapper {
            position: relative;
            width: 120px;
            height: 220px;
            /* Creates the organic teardrop/cocoon shape */
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: rgba(10, 10, 10, 0.4);
            border: 1px solid rgba(255, 106, 0, 0.2);
            /* Glassmorphism blur for the shell */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            /* The inner ember glow */
            box-shadow:
                inset 0 -20px 50px rgba(204, 17, 0, 0.8),
                inset 0 10px 20px rgba(0, 0, 0, 0.9),
                0 0 30px rgba(255, 106, 0, 0.1);
            animation: breathe 4s ease-in-out infinite, struggle 6s ease-in-out infinite;
            overflow: hidden;
        }

        /* The shifting fire inside */
        .ember-core {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, var(--fire-core) 0%, var(--fire-mid) 40%, transparent 70%);
            border-radius: 50%;
            opacity: 0.7;
            filter: blur(15px);
            animation: pulse-fire 3s alternate infinite;
        }

        /* Additional shifting ember patches */
        .ember-patch {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--fire-mid);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0;
            animation: flare-up 5s infinite;
        }

        .ember-patch:nth-child(2) {
            top: 40%;
            left: 10%;
            animation-delay: 1.5s;
            width: 40px;
        }

        .ember-patch:nth-child(3) {
            top: 60%;
            right: 10%;
            animation-delay: 3s;
            background: var(--fire-dark);
        }

        /* Typography */
        .text-content {
            max-width: 600px;
            padding: 0 20px;
            animation: fade-in 3s ease-out forwards;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            line-height: 1.3;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #ffbb88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 106, 0, 0.2);
        }

        p.quote-source {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--fire-mid);
            letter-spacing: 4px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        p.subtext {
            font-size: 1.1rem;
            color: #888;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .coming-soon {
            display: inline-block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            padding: 10px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        .coming-soon:hover {
            border-color: var(--fire-mid);
            background: rgba(255, 106, 0, 0.1);
            box-shadow: 0 0 15px rgba(255, 106, 0, 0.2);
        }

        /* Animations */
        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                box-shadow: inset 0 -20px 50px rgba(204, 17, 0, 0.6), inset 0 10px 20px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 106, 0, 0.1);
            }

            50% {
                transform: scale(1.02);
                box-shadow: inset 0 -30px 60px rgba(255, 106, 0, 0.8), inset 0 10px 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(255, 106, 0, 0.3);
            }
        }

        @keyframes struggle {

            0%,
            45%,
            55%,
            100% {
                transform: rotate(0deg);
            }

            48% {
                transform: rotate(-2deg);
            }

            52% {
                transform: rotate(2deg);
            }
        }

        @keyframes pulse-fire {
            0% {
                opacity: 0.5;
                transform: translateX(-50%) scale(0.9);
            }

            100% {
                opacity: 0.9;
                transform: translateX(-50%) scale(1.1);
            }
        }

        @keyframes flare-up {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.8);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.2);
            }
        }

        @keyframes fade-in {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <canvas id="smokeCanvas"></canvas>

    <div class="container">
        <div class="chrysalis-wrapper">
            <div class="ember-core"></div>
            <div class="ember-patch"></div>
            <div class="ember-patch"></div>
        </div>

        <div class="text-content">
            <p class="quote-source">Behold, I am doing a new thing</p>
            <h1>Forged in the fire.<br>I rise... reborn.</h1>
            <p class="subtext">The architecture is shifting. Tearing down the old structures to build the ultimate
                foundation. Something powerful is breathing inside.</p>
            <div class="coming-soon">Metamorphosis in Progress</div>
        </div>
    </div>

    <script>
        // JavaScript Particle System for Smoke and Stray Embers
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                // Start particles near the center (behind the chrysalis)
                this.x = width / 2 + (Math.random() * 60 - 30);
                this.y = height / 2 - 50 + (Math.random() * 40);

                // 80% chance of smoke (gray/black), 20% chance of ember (orange/red)
                this.isEmber = Math.random() > 0.8;

                if (this.isEmber) {
                    this.size = Math.random() * 2 + 1;
                    this.speedY = Math.random() * -2 - 1;
                    this.speedX = (Math.random() - 0.5) * 1.5;
                    this.life = Math.random() * 100 + 50;
                    this.color = `rgba(255, ${Math.floor(Math.random() * 150 + 50)}, 0, `;
                } else {
                    this.size = Math.random() * 20 + 10;
                    this.speedY = Math.random() * -1 - 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.life = Math.random() * 200 + 100;
                    this.color = `rgba(${Math.floor(Math.random() * 40 + 10)}, ${Math.floor(Math.random() * 40 + 10)}, ${Math.floor(Math.random() * 40 + 10)}, `;
                }

                this.maxLife = this.life;
                this.opacity = 0;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;

                // Fade in and out
                if (this.maxLife - this.life < 30) {
                    this.opacity += 0.03; // Fade in
                } else {
                    this.opacity = (this.life / this.maxLife) * (this.isEmber ? 0.8 : 0.3); // Fade out
                }

                // Grow smoke over time
                if (!this.isEmber) {
                    this.size += 0.1;
                }

                if (this.life <= 0 || this.opacity <= 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.opacity + ")";

                if (!this.isEmber) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                } else {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff6a00';
                }

                ctx.fill();
                ctx.shadowBlur = 0; // Reset for next particle
            }
        }

        // Initialize particles
        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
            // Randomize starting life so they don't all spawn at once
            particles[i].life = Math.random() * particles[i].maxLife;
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
