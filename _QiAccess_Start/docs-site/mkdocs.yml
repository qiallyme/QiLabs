# Reference settings for the MkDocs site layer.
# Verified builds use a generated per-run config created by scripts/sync_docs_site.py
# so the source docs can be normalized in a runtime copy without editing docs/.

site_name: QiAccess Knowledge Docs
site_description: Generated static documentation site built from the source docs vault.
site_dir: ../.runtime/mkdocs/site-static
docs_dir: ../docs
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: blue
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

exclude_docs: |
  .obsidian-qidocs/
  .obsidian-qidocs/**
  .smart-env/
  .smart-env/**
  **/.obsidian/
  **/.obsidian/**

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator_notice: Source markdown remains in docs/. MkDocs reads it directly without modifying the source files.
