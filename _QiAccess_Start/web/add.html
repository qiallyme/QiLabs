<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QiAccess // Add Entry</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .form-card {
            max-width: 600px;
            margin: 2rem auto;
            padding: 3rem;
        }
        .form-group {
            margin-bottom: 2rem;
        }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            color: #fff;
            outline: none;
            transition: var(--transition-smooth);
            font-family: inherit;
        }
        .form-input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem 2rem;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: var(--transition-smooth);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        #status-msg {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            text-align: center;
            min-height: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="background-wrapper">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="brand">
                <div class="status-line">
                    <div class="status-indicator"></div>
                    DATABASE_WRITE_MODE
                </div>
                <h1>New Entry</h1>
            </div>
            <a href="index.html" class="btn-secondary">
                <i data-lucide="chevron-left"></i> Back
            </a>
        </header>

        <div class="card form-card">
            <form id="bookmark-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" class="form-input" placeholder="e.g. Documentation Hub" required>
                </div>
                
                <div class="form-group">
                    <label for="url">URL</label>
                    <input type="url" id="url" class="form-input" placeholder="https://..." required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" class="form-input" placeholder="e.g. Development">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" class="form-input" placeholder="Short description...">
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-add" style="flex: 2; justify-content: center;">
                        <i data-lucide="save"></i> Save Bookmark
                    </button>
                </div>
                
                <div id="status-msg"></div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const API_URL = 'https://api.access.qially.com/bookmarks';
        const form = document.getElementById('bookmark-form');
        const statusMsg = document.getElementById('status-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                url: document.getElementById('url').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                scope: 'cloud',
                tags: []
            };

            statusMsg.textContent = 'Transmitting data...';
            statusMsg.style.color = 'var(--text-muted)';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    statusMsg.textContent = 'Success. Entry added to D1.';
                    statusMsg.style.color = '#22c55e';
                    form.reset();
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    const err = await res.json();
                    throw new Error(err.error || 'Failed to save');
                }
            } catch (err) {
                statusMsg.textContent = `Error: ${err.message}`;
                statusMsg.style.color = '#ef4444';
            }
        });
        
        if (typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>
</html>
