<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --line-color: #334155;
            /* Category Colors */
            --color-milestone: #f59e0b;
            --color-finance: #10b981;
            --color-dev: #3b82f6;
            --color-default: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden; /* Prevent normal horizontal scroll */
            font-family: 'Inter', sans-serif;
        }

        /* The Scroll Container: This stays fixed while we scroll vertically */
        #viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            will-change: transform;
        }

        /* The Horizontal Track */
        #timeline-track {
            display: flex;
            padding: 0 10vw;
            gap: 4rem;
            align-items: center;
            transition: transform 0.1s ease-out; /* Smooths the mouse wheel */
        }

        /* The Center Spine */
        .spine {
            position: absolute;
            top: 50%;
            left: 0;
            width: 5000px; /* Over-sized to ensure it covers long timelines */
            height: 2px;
            background: var(--line-color);
            z-index: -1;
        }

        /* Entry Cards */
        .entry-card {
            flex: 0 0 350px; /* Fixed width for cards */
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            position: relative;
            border-left: 6px solid var(--color-default);
            transition: transform 0.3s ease;
        }

        /* Category Border Logic */
        .entry-card[data-category="milestone"] { border-color: var(--color-milestone); }
        .entry-card[data-category="finance"] { border-color: var(--color-finance); }
        .entry-card[data-category="dev"] { border-color: var(--color-dev); }

        .entry-card:hover {
            transform: translateY(-10px);
        }

        /* The Connector Stem */
        .entry-card::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            width: 20px;
            height: 2px;
            background: var(--line-color);
        }

        /* Asset Styling */
        .asset-preview {
            width: 100%;
            border-radius: 8px;
            margin-top: 1rem;
            background: #000;
            max-height: 200px;
            object-fit: cover;
        }

        /* Spacer to create scroll height */
        #scroll-dist {
            width: 1px;
        }
    </style>
</head>
<body>

    <div id="scroll-dist"></div> <div id="viewport">
        <div class="spine"></div>
        <div id="timeline-track">
            </div>
    </div>

    <script>
        const track = document.getElementById('timeline-track');
        const scrollDist = document.getElementById('scroll-dist');

        async function initTimeline() {
            // 1. Fetch the JSON generated by Python
            const response = await fetch('timeline.json');
            const data = await response.json();

            // 2. Build the HTML
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'entry-card';
                card.dataset.category = item.category || 'default';

                let assetHTML = '';
                if (item.type === 'video') {
                    assetHTML = `<video class="asset-preview" controls src="${item.asset_path}"></video>`;
                } else if (item.type === 'infographic') {
                    assetHTML = `<img class="asset-preview" src="${item.asset_path}" alt="${item.title}">`;
                } else if (item.type === 'audio') {
                    assetHTML = `<audio class="w-full mt-4" controls src="${item.asset_path}"></audio>`;
                } else {
                    assetHTML = `<a href="${item.asset_path}" target="_blank" class="block mt-4 text-blue-400 underline">View Document</a>`;
                }

                card.innerHTML = `
                    <span class="text-xs font-mono text-slate-500">${item.date}</span>
                    <h3 class="text-xl font-bold mt-1">${item.title}</h3>
                    <div class="text-sm text-slate-400 mt-2">${item.description}</div>
                    ${assetHTML}
                `;
                track.appendChild(card);
            });

            // 3. Setup Scroll Math
            const totalWidth = track.scrollWidth;
            const viewportWidth = window.innerWidth;
            const scrollLength = totalWidth - viewportWidth + (viewportWidth * 0.2); // Add some padding

            // Set the body height so we have room to scroll
            scrollDist.style.height = `${scrollLength}px`;

            window.addEventListener('scroll', () => {
                const scrolled = window.scrollY;
                // Translate the track to the left as we scroll down
                track.style.transform = `translateX(-${scrolled}px)`;
            });
        }

        initTimeline();
    </script>
</body>
</html>
