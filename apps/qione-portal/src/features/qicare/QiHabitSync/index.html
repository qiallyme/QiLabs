<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple Habit Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #f3f4f6; touch-action: manipulation; }
        .input-card { @apply bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100; }
        .label-text { @apply block text-sm font-semibold text-gray-600 mb-1; }
        .std-input { @apply w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen pb-20">
    
    <div class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <h1 class="font-bold text-xl text-gray-800">Sync<span class="text-blue-500">Tracker</span></h1>
        <select v-model="currentUser" class="bg-gray-100 rounded p-1 text-sm">
            <option value="Partner A">Partner A</option>
            <option value="Partner B">Partner B</option>
        </select>
    </div>

    <div class="flex justify-center my-4 space-x-2 px-4">
        <button @click="view = 'log'" :class="view === 'log' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600'" class="flex-1 py-2 rounded-lg font-medium shadow-sm transition">📝 Log Today</button>
        <button @click="fetchData" :class="view === 'dash'" class="flex-1 py-2 rounded-lg font-medium shadow-sm bg-white text-gray-600 transition" @click="view='dash'">📊 Dashboard</button>
    </div>

    <div v-if="view === 'log'" class="px-4 animate-fade-in">
        
        <div class="input-card">
            <label class="label-text">Date</label>
            <input type="date" v-model="form.log_date" class="std-input">
        </div>

        <div class="input-card grid grid-cols-2 gap-4">
            <div>
                <label class="label-text">Systolic (BP)</label>
                <input type="number" v-model="form.bp_systolic" placeholder="120" class="std-input">
            </div>
            <div>
                <label class="label-text">Diastolic (BP)</label>
                <input type="number" v-model="form.bp_diastolic" placeholder="80" class="std-input">
            </div>
            <div class="col-span-2">
                <label class="label-text">Heart Rate (BPM)</label>
                <input type="number" v-model="form.heart_rate" placeholder="72" class="std-input">
            </div>
        </div>

        <div class="input-card">
            <label class="label-text">Water (oz)</label>
            <input type="range" v-model="form.water_oz" min="0" max="150" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
            <div class="text-right text-blue-600 font-bold">{{ form.water_oz }} oz</div>
        </div>

        <div class="input-card grid grid-cols-2 gap-4">
            <div>
                <label class="label-text">Alcohol (Units)</label>
                <input type="number" v-model="form.alcohol_units" class="std-input">
            </div>
            <div>
                <label class="label-text">Stimulants (mg)</label>
                <input type="number" v-model="form.stimulants_mg" placeholder="Caffeine" class="std-input">
            </div>
        </div>

        <div class="input-card">
            <label class="label-text">Mood (1-5)</label>
            <div class="flex justify-between mt-2">
                <button v-for="n in 5" :key="n" @click="form.mood_rating = n" 
                    :class="form.mood_rating === n ? 'bg-blue-500 text-white scale-110' : 'bg-gray-100 text-gray-500'"
                    class="w-10 h-10 rounded-full font-bold transition">
                    {{ n }}
                </button>
            </div>
        </div>

        <div class="input-card">
            <label class="label-text">Sleep (Hours)</label>
            <input type="number" step="0.5" v-model="form.sleep_hours" class="std-input">
        </div>

        <div class="input-card">
            <label class="label-text">Exercise (Mins)</label>
            <input type="number" v-model="form.exercise_mins" class="std-input">
        </div>

        <div class="input-card space-y-3">
            <div class="flex items-center justify-between">
                <span class="text-gray-700">Intimacy / Intercourse</span>
                <input type="checkbox" v-model="form.intimacy" class="w-6 h-6 text-blue-600 rounded focus:ring-blue-500">
            </div>
            <hr>
            <div class="flex items-center justify-between">
                <span class="text-gray-700">Medications Taken</span>
                <input type="checkbox" v-model="form.medications_taken" class="w-6 h-6 text-green-600 rounded focus:ring-green-500">
            </div>
        </div>

        <div class="input-card">
            <label class="label-text">Food Notes</label>
            <textarea v-model="form.food_notes" rows="3" class="std-input" placeholder="What did you eat today?"></textarea>
        </div>

        <button @click="submitLog" :disabled="loading" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition mb-8">
            {{ loading ? 'Saving...' : 'Save Daily Log' }}
        </button>
    </div>

    <div v-else class="px-4 pb-10">
        <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
            <h3 class="font-bold text-gray-700 mb-2">Mood & Energy (Last 7 Days)</h3>
            <canvas id="moodChart"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
            <h3 class="font-bold text-gray-700 mb-2">Blood Pressure Trends</h3>
            <canvas id="bpChart"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm text-center">
                <div class="text-xs text-gray-500 uppercase">Avg Sleep</div>
                <div class="text-2xl font-bold text-indigo-600">{{ stats.avgSleep }}h</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm text-center">
                <div class="text-xs text-gray-500 uppercase">Intimacy Freq</div>
                <div class="text-2xl font-bold text-pink-500">{{ stats.intimacyCount }}x</div>
            </div>
        </div>
    </div>

</div>

<script>
    const { createApp } = Vue;
    // --- CONFIGURATION ---
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_KEY'; 
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    createApp({
        data() {
            return {
                view: 'log',
                loading: false,
                currentUser: 'Partner A',
                form: {
                    log_date: new Date().toISOString().split('T')[0],
                    water_oz: 0,
                    exercise_mins: 0,
                    intimacy: false,
                    sleep_hours: 7,
                    alcohol_units: 0,
                    bp_systolic: null,
                    bp_diastolic: null,
                    heart_rate: null,
                    mood_rating: 3,
                    stimulants_mg: 0,
                    medications_taken: false,
                    food_notes: ''
                },
                stats: { avgSleep: 0, intimacyCount: 0 }
            }
        },
        methods: {
            async submitLog() {
                this.loading = true;
                const { error } = await supabase.from('habit_logs').insert({
                    user_name: this.currentUser,
                    ...this.form
                });

                if (error) alert('Error saving: ' + error.message);
                else {
                    alert('Log saved!');
                    this.resetForm();
                }
                this.loading = false;
            },
            resetForm() {
                // Keep date, reset others if needed, usually users log once per day
            },
            async fetchData() {
                this.view = 'dash';
                // Fetch last 7 days of data for the Current User
                const { data, error } = await supabase
                    .from('habit_logs')
                    .select('*')
                    .eq('user_name', this.currentUser)
                    .order('log_date', { ascending: true })
                    .limit(7);

                if(!error && data) {
                    this.renderCharts(data);
                    this.calculateStats(data);
                }
            },
            calculateStats(data) {
                if(data.length === 0) return;
                const totalSleep = data.reduce((acc, curr) => acc + (curr.sleep_hours || 0), 0);
                this.stats.avgSleep = (totalSleep / data.length).toFixed(1);
                this.stats.intimacyCount = data.filter(r => r.intimacy).length;
            },
            renderCharts(data) {
                const ctxMood = document.getElementById('moodChart');
                const ctxBP = document.getElementById('bpChart');

                // Destroy old instances if they exist (simple check)
                if(window.myMoodChart) window.myMoodChart.destroy();
                if(window.myBPChart) window.myBPChart.destroy();

                const labels = data.map(d => d.log_date);

                window.myMoodChart = new Chart(ctxMood, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Mood', data: data.map(d => d.mood_rating), borderColor: '#3b82f6', tension: 0.4 },
                            { label: 'Sleep (hrs)', data: data.map(d => d.sleep_hours), borderColor: '#6366f1', borderDash: [5, 5] }
                        ]
                    }
                });

                window.myBPChart = new Chart(ctxBP, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Systolic', data: data.map(d => d.bp_systolic), backgroundColor: '#ef4444' },
                            { label: 'Diastolic', data: data.map(d => d.bp_diastolic), backgroundColor: '#f87171' }
                        ]
                    }
                });
            }
        }
    }).mount('#app');
</script>
</body>
</html>
