name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atrium
          POSTGRES_PASSWORD: atrium
          POSTGRES_DB: atrium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atrium"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://atrium:atrium@localhost:5432/atrium?schema=public
      DIRECT_URL: postgresql://atrium:atrium@localhost:5432/atrium?schema=public
      BETTER_AUTH_SECRET: ci-test-secret-that-is-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3001
      API_URL: http://localhost:3001
      WEB_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      STORAGE_PROVIDER: local
      UPLOAD_DIR: ./uploads

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run db:generate

      - run: bun run build

      - run: bun run test

      # E2E tests with Playwright
      - run: bun run db:push

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bunx playwright test --config=e2e/playwright.config.ts
        env:
          CI: "true"
          THROTTLE_LIMIT: "10000"
          SIGNUP_THROTTLE_LIMIT: "100"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
