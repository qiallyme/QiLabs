<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lina · Lumara Navigator Widget</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #111827;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .widget-header {
    padding: 10px 12px;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(135deg, #fff7ef, #fffaf6);
    display: flex;
    align-items: center;
  }
  .widget-title {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .lina-avatar {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    background: radial-gradient(circle at 30% 0%, #ffe5de 0, #ff6b35 40%, #d84315 100%);
    box-shadow: 0 0 12px rgba(255, 107, 53, 0.55);
    position: relative;
    overflow: hidden;
  }
  .lina-avatar::after {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: inherit;
    border: 1px solid rgba(255,255,255,.7);
  }
  .widget-title-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .widget-title-text span:first-child {
    font-size: 0.85rem;
    font-weight: 600;
  }
  .widget-title-text span:last-child {
    font-size: 0.73rem;
    color: #6b7280;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bubble {
    max-width: 90%;
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 0.82rem;
    line-height: 1.45;
  }
  .bubble.lina {
    background: #fff7ef;
    border: 1px solid #fde2cf;
    align-self: flex-start;
    color: #4b5563;
  }
  .bubble.user {
    background: #e0f2fe;
    border: 1px solid #7dd3fc;
    align-self: flex-end;
    color: #0c4a6e;
  }
  .bubble small {
    display: block;
    margin-top: 4px;
    font-size: 0.68rem;
    color: #6b7280;
  }
  .input-row {
    border-top: 1px solid #e5e7eb;
    padding: 10px;
    display: flex;
    gap: 6px;
  }
  input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    outline: none;
    font-size: 0.8rem;
  }
  button.send-btn {
    border: none;
    border-radius: 12px;
    padding: 8px 14px;
    background: linear-gradient(135deg, #ff6b35, #ffb347);
    color: #111827;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="widget-header">
  <div class="widget-title">
    <div class="lina-avatar"></div>
    <div class="widget-title-text">
      <span>Lina</span>
      <span>Lumara Navigator · Demo</span>
    </div>
  </div>
</div>

<div class="messages" id="msgs">
  <div class="bubble lina">
    Hi love, I’m Lina. 💛<br><br>
    This is a safe demo to show how Lumara supports immigrant families in tough moments.
    <small>Demo · Not real legal or emergency help.</small>
  </div>
</div>

<div class="input-row">
  <input id="msgInput" type="text" placeholder="Describe a situation to simulate…" />
  <button class="send-btn" id="sendBtn">Send</button>
</div>

<script src="/assets/js/lina-api-client.js"></script>
<script>
  const msgs = document.getElementById("msgs");
  const input = document.getElementById("msgInput");
  const send = document.getElementById("sendBtn");

  const conversation = [
    {
      role: "assistant",
      content:
        "Hi love, I’m Lina. This is a safe demo to show how Lumara supports immigrant families in tough moments."
    }
  ];

  function addBubble(role, text, meta) {
    const b = document.createElement("div");
    b.className = "bubble " + (role === "lina" ? "lina" : "user");
    b.innerHTML = text.replace(/\n/g, "<br>");
    if (meta) {
      const m = document.createElement("small");
      m.textContent = meta;
      b.appendChild(m);
    }
    msgs.appendChild(b);
    msgs.scrollTop = msgs.scrollHeight;

    if (role === "lina") {
      conversation.push({ role: "assistant", content: text });
    } else {
      conversation.push({ role: "user", content: text });
    }
  }

  async function handleSend() {
    const val = input.value.trim();
    if (!val) return;
    addBubble("user", val);
    input.value = "";

    try {
      const result = await window.linaApi.sendMessage(conversation, {
        language: "en",
        voice: false,
        source: "iframe-widget"
      });
      addBubble("lina", result.reply || "I’m here with you. Something went wrong on my side, but you’re not alone. 💛");
    } catch (err) {
      console.error(err);
      addBubble(
        "lina",
        "I’m having trouble reaching the Lumara network right now. Please try again in a moment, or contact local emergency services if you’re in immediate danger. 💛"
      );
    }
  }

  send.addEventListener("click", handleSend);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      handleSend();
    }
  });
</script>

</body>
</html>
