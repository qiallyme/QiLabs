<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* Basic Reset */
      body,
      h1,
      h2,
      h3,
      p,
      a {
        margin: 0;
        padding: 0;
        font-family: "Inter", Arial, sans-serif;
      }
      body {
        background-color: #f4f7fa;
      }
      .email-container {
        max-width: 600px;
        margin: 20px auto;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e0e0e0;
      }
      .header {
        background-color: #ffffff;
        padding: 40px 20px;
        text-align: center;
        border-bottom: 1px solid #e0e0e0;
      }
      .header img {
        max-width: 100px;
      }
      .content {
        padding: 40px 30px;
        color: #333333;
        line-height: 1.6;
      }
      .content h1 {
        color: #1e293b;
        font-size: 24px;
        margin-bottom: 15px;
      }
      .content p {
        font-size: 16px;
        margin-bottom: 20px;
        color: #475569;
      }
      .button-container {
        text-align: center;
        margin: 30px 0;
      }
      .button {
        background-color: #4f46e5 !important;
        color: #ffffff !important;
        padding: 14px 28px;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        display: inline-block;
      }
      .signature {
        padding: 20px 30px;
        font-size: 15px;
        color: #475569;
      }
      .footer {
        background-color: #f8fafc;
        padding: 30px;
        text-align: center;
        font-size: 12px;
        color: #64748b;
      }
      .footer a {
        color: #4f46e5;
        text-decoration: none;
      }
      .footer .social-links a {
        margin: 0 8px;
        display: inline-block;
      }
      .divider {
        border-bottom: 1px solid #e0e0e0;
        margin: 20px 0;
      }

      @media (max-width: 600px) {
        .content {
          padding: 30px 20px;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="email-container">
      <div class="header">
        <img
          src="https://i.imgur.com/H40n21f.png"
          alt="QiAlly Logo"
          onerror="
            this.onerror = null;
            this.src = 'https://placehold.co/100x100/4f46e5/ffffff?text=QiAlly';
          "
        />
      </div>
    </div>
  </body>
</html>
