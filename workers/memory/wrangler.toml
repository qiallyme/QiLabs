name = "qimemory-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# If you want to bind this Worker to your Pages domain at /query later,
# you'll do it in Cloudflare UI: Pages → Functions/Routes → add route `/query` → select this Worker.

[vars]
# Default chat model (can be overridden by secret)
CHAT_MODEL = "gpt-4o-mini"

# Set these as SECRETS (via sync-secrets.sh/.ps1 or wrangler secret put):
# OPENAI_API_KEY
# SUPABASE_URL
# SUPABASE_ANON_KEY
