# Tool Manifest for GINA
# Defines available tools that GINA can invoke through /tools/invoke

tools:
  - name: "web_search"
    description: "Search the web for recent information about a topic."
    backend: "python"
    entrypoint: "tools/web_search.py"
    args:
      query:
        type: "string"
        description: "Search query string"
        required: true
      max_results:
        type: "integer"
        description: "Maximum number of results"
        default: 5

  - name: "web_get"
    description: "Fetch the content of a given URL."
    backend: "python"
    entrypoint: "tools/web_get.py"
    args:
      url:
        type: "string"
        description: "URL to fetch"
        required: true

  - name: "create_vault_note"
    description: "Create a new markdown note in realms/qivault/kb."
    backend: "python"
    entrypoint: "tools/create_vault_note.py"
    args:
      title:
        type: "string"
        description: "Human-readable title for the note"
        required: true
      content:
        type: "string"
        description: "Markdown content for the note"
        required: true

  - name: "append_to_vault_note"
    description: "Append content to an existing note in realms/qivault/kb."
    backend: "python"
    entrypoint: "tools/append_to_vault_note.py"
    args:
      path:
        type: "string"
        description: "QiOS-relative path to the note file"
        required: true
      content:
        type: "string"
        description: "Markdown content to append"
        required: true

  - name: "list_realm_files"
    description: "List files under a given QiOS realm path."
    backend: "python"
    entrypoint: "tools/list_realm_files.py"
    args:
      path:
        type: "string"
        description: "QiOS-relative path (e.g. realms/qivault/kb)"
        required: true

  - name: "run_agent_command"
    description: "Invoke qios_agent with a subcommand on the local machine."
    backend: "python"
    entrypoint: "tools/run_agent_command.py"
    args:
      command:
        type: "string"
        description: "Subcommand name"
        required: true
      args:
        type: "array"
        items: "string"
        description: "Additional arguments"
        default: []

  # CRM Integration Tools (Zoho)
  - name: "crm_search_person"
    description: "Search CRM for a person by name or email."
    backend: "python"
    entrypoint: "tools/crm_search_person.py"
    args:
      query:
        type: "string"
        description: "Name or email to search for"
        required: true

  - name: "crm_list_recent_contacts"
    description: "List the most recently updated contacts."
    backend: "python"
    entrypoint: "tools/crm_list_recent_contacts.py"
    args:
      limit:
        type: "integer"
        description: "Maximum number of contacts to return"
        default: 10

  - name: "crm_create_contact"
    description: "Create a new contact in Zoho CRM."
    backend: "python"
    entrypoint: "tools/crm_create_contact.py"
    args:
      full_name:
        type: "string"
        description: "Full name"
        required: true
      email:
        type: "string"
        description: "Email address"
        required: false
      phone:
        type: "string"
        description: "Phone number"
        required: false
      note:
        type: "string"
        description: "Optional notes/description"
        required: false

  - name: "crm_create_task"
    description: "Create a follow-up task for an existing CRM contact."
    backend: "python"
    entrypoint: "tools/crm_create_task.py"
    args:
      contact_id:
        type: "string"
        description: "Zoho contact ID"
        required: true
      title:
        type: "string"
        description: "Task title"
        required: true
      due_date:
        type: "string"
        description: "ISO 8601 date string (optional)"
        required: false
      description:
        type: "string"
        description: "Task description (optional)"
        required: false

  # Email Integration Tools (IMAP/SMTP)
  - name: "mail_get_recent"
    description: "Get recent emails from inbox."
    backend: "python"
    entrypoint: "tools/mail_get_recent.py"
    args:
      limit:
        type: "integer"
        description: "Maximum number of emails to return"
        default: 20

  - name: "mail_send"
    description: "Send an email via SMTP."
    backend: "python"
    entrypoint: "tools/mail_send.py"
    args:
      to:
        type: "string"
        description: "Recipient email address"
        required: true
      subject:
        type: "string"
        description: "Email subject"
        required: true
      body:
        type: "string"
        description: "Email body (plain text)"
        required: true

  # Calendar Integration Tools (Google Calendar)
  - name: "calendar_get_upcoming"
    description: "Get upcoming calendar events."
    backend: "python"
    entrypoint: "tools/calendar_get_upcoming.py"
    args:
      hours_ahead:
        type: "integer"
        description: "How many hours ahead to look"
        default: 24

  - name: "calendar_create_event"
    description: "Create a calendar event."
    backend: "python"
    entrypoint: "tools/calendar_create_event.py"
    args:
      title:
        type: "string"
        description: "Event title"
        required: true
      start:
        type: "string"
        description: "ISO 8601 start time"
        required: true
      end:
        type: "string"
        description: "ISO 8601 end time"
        required: true
      location:
        type: "string"
        description: "Event location (optional)"
        required: false
      description:
        type: "string"
        description: "Event description (optional)"
        required: false
      attendees:
        type: "array"
        items: "string"
        description: "List of attendee email addresses (optional)"
        default: []

  # SMS Integration Tools (Twilio)
  - name: "sms_send"
    description: "Send an SMS message via Twilio."
    backend: "python"
    entrypoint: "tools/sms_send.py"
    args:
      to:
        type: "string"
        description: "Recipient phone number in E.164 format (e.g., +1234567890)"
        required: true
      body:
        type: "string"
        description: "Message body"
        required: true

  # Document Search Tools
  - name: "search_processed_documents"
    description: "Search for processed documents in the semantic profile database."
    backend: "python"
    entrypoint: "tools/search_processed_documents.py"
    args:
      query:
        type: "string"
        description: "Search query (searches file_path, slug, realm, content)"
        required: false
      realm:
        type: "string"
        description: "Filter by realm (e.g., QiPersonal, QiBusiness, QiVault)"
        required: false
      limit:
        type: "integer"
        description: "Maximum number of results"
        default: 20

  # Worker Management Tools
  - name: "start_worker"
    description: "Start a QiOS worker (local Python worker or Cloudflare Worker)."
    backend: "python"
    entrypoint: "tools/start_worker.py"
    args:
      worker_name:
        type: "string"
        description: "Name of worker to start (e.g., 'local_core', 'ingestion', 'embedder')"
        required: true
      worker_type:
        type: "string"
        description: "Type: 'local' or 'cloudflare'"
        default: "local"

  - name: "start_agent_service"
    description: "Call qios_agent HTTP API to start services, scan, extract, etc."
    backend: "python"
    entrypoint: "tools/start_agent_service.py"
    args:
      endpoint:
        type: "string"
        description: "Agent endpoint: /start/workers, /start/dev-stack, /agent/scan, /agent/extract"
        required: true
      params:
        type: "object"
        description: "Optional parameters for the endpoint"
        default: {}

  - name: "check_worker_status"
    description: "Check if a worker is running (via worker_status table or process check)."
    backend: "python"
    entrypoint: "tools/check_worker_status.py"
    args:
      worker_name:
        type: "string"
        description: "Name of worker to check"
        required: false

